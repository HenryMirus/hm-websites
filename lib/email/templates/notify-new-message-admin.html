<!DOCTYPE html>
<!--
  SYSTEM TEMPLATE — Neue Nachricht → Admin
  ─────────────────────────────────────────────────────────────────────────────
  Wird automatisch gesendet wenn ein Kunde eine Nachricht im Portal sendet.
  Implementierung: lib/email/notify.ts → notifyAdminsNewMessage()
  Wird aufgerufen aus: app/portal/messages/_actions.ts → sendMessageAction()
  ─────────────────────────────────────────────────────────────────────────────
  Variablen: adminEmails (Array), clientName, preview, portalUrl/messages
-->
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Neue Nachricht von [KUNDENNAME]</title>
</head>
<body style="margin:0;padding:0;background-color:#09090F;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
<span style="display:none;font-size:1px;color:#09090F;max-height:0;max-width:0;opacity:0;overflow:hidden;">[KUNDENNAME] hat eine neue Nachricht gesendet.</span>

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#09090F;">
<tr><td align="center" style="padding:48px 16px 40px;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:540px;">

  <tr><td align="center" style="padding-bottom:36px;">
    <a href="https://hm-labs.de" target="_blank" style="text-decoration:none;">
      <img src="https://hm-labs.de/hm-labs-logo-v3.png" alt="HM Labs" width="130" style="display:block;border:0;"/>
    </a>
  </td></tr>

  <tr><td style="background-color:#111118;border:1px solid #1E1E2E;border-radius:16px;overflow:hidden;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <!-- Coral-Akzent für Admin-Notification — sofort sichtbar unterschiedlich -->
      <tr><td style="height:3px;background:linear-gradient(90deg,#FF4D6A 0%,#FF7A8A 100%);">&nbsp;</td></tr>
      <tr><td style="padding:36px 36px 32px;">

        <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
          <tr><td style="background-color:rgba(255,77,106,0.10);border:1px solid rgba(255,77,106,0.22);border-radius:12px;width:48px;height:48px;text-align:center;vertical-align:middle;font-size:22px;line-height:48px;">&#x1F514;</td></tr>
        </table>

        <h1 style="margin:0 0 10px;font-size:22px;font-weight:700;color:#EEEEFF;letter-spacing:-0.4px;line-height:1.3;">Nachricht von [KUNDENNAME]</h1>
        <p style="margin:0 0 20px;font-size:15px;color:#8888AA;line-height:1.7;">
          <strong style="color:#EEEEFF;">[KUNDENNAME]</strong> hat eine neue Nachricht im Portal gesendet.
        </p>

        <!-- Preview-Box -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
          <tr><td style="background-color:#09090F;border:1px solid #1E1E2E;border-left:3px solid #FF4D6A;border-radius:8px;padding:14px 16px;">
            <p style="margin:0;font-size:13px;color:#8888AA;font-style:italic;line-height:1.6;">&ldquo;[MESSAGE_PREVIEW]&rdquo;</p>
          </td></tr>
        </table>

        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
          <tr><td style="height:1px;background-color:#1E1E2E;">&nbsp;</td></tr>
        </table>

        <table cellpadding="0" cellspacing="0" border="0">
          <tr><td style="border-radius:10px;background-color:#FF4D6A;">
            <a href="[PORTAL_MESSAGES_URL]" target="_blank" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:600;color:#FFFFFF;text-decoration:none;border-radius:10px;">
              Im Portal öffnen &rarr;
            </a>
          </td></tr>
        </table>

      </td></tr>
    </table>
  </td></tr>

  <tr><td align="center" style="padding-top:28px;">
    <p style="margin:0;font-size:12px;color:#5A5A7A;line-height:2.0;">
      <strong style="color:#8888AA;">HM Labs</strong> &mdash; Interne Admin-Benachrichtigung<br/>
      <a href="https://hm-labs.de" style="color:#4F7FFF;text-decoration:none;">hm-labs.de</a>
    </p>
  </td></tr>

</table>
</td></tr></table>
</body>
</html>
